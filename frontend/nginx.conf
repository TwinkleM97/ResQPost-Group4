server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Allow image uploads up to 25 MB (matches your app)
  client_max_body_size 25m;

  # Log to Docker stdout/stderr
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  # -------- Performance ----------
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Gzip (safe types only)
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/font-woff
    application/font-woff2
    font/woff
    font/woff2;

  # -------- Security headers (sane defaults) ----------
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  # Content-Security-Policy: add only if you’ve whitelisted any externals (e.g. map tiles)
  # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self';" always;

  # -------- SPA: serve build and fall back to index.html ----------
  location / {
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Never cache index.html (ensures users get the latest build)
  location = /index.html {
    add_header Cache-Control "no-store" always;
  }

  # Long cache for hashed static assets (JS/CSS/images/fonts)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # -------- API proxy (REST) ----------
  location ^~ /api/ {
    proxy_http_version 1.1;
    proxy_pass http://backend:5000;

    # Pass through client info
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Conservative timeouts (uploads can be big)
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Do not cache API responses here
    add_header Cache-Control "no-store" always;
  }

  # -------- WebSocket proxy (Socket.IO) ----------
  location ^~ /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://backend:5000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  # -------- Uploaded files (served by backend) ----------
  location ^~ /uploads/ {
    proxy_http_version 1.1;
    proxy_pass http://backend:5000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  # Simple health check for nginx itself
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
