server {
  listen 80;
  root /usr/share/nginx/html;
  client_max_body_size 25m;

  # SPA: serve React, fall back to index.html
  location / {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to Flask
  location ^~ /api/ {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }

  # Proxy uploaded images to Flask's /uploads route
  location ^~ /uploads/ {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }

  # Long cache for built static assets (add webp/avif)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Ensure index.html isn’t cached (always add header)
  location = /index.html {
    add_header Cache-Control "no-store" always;
  }
}
